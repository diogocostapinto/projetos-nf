<style>
  :root{
    --bg:#EAEEEB; --surface:#FFFFFF; --column:#E1E7E3;
    --ink:#1B2A25; --muted:#6B7A73; --line:#D2DAD5;
    --pine:#2F6F5E; --pine-deep:#245646; --amber:#C07A24; --clay:#AE402B;
    --on-pine:#EAF3EF;
    --input-bg:#FBFCFB; --sel:#CDE3DB;
    --chip-bg:#EEF2F0; --chip-tx:#6B7A73;
    --ok-bg:#E4EFE9; --ok-tx:#245646;
    --soon-bg:#F6ECD9; --soon-tx:#8A5A12;
    --late-bg:#F5E1DC; --late-tx:#8E3320;
    --st-ativo-bg:#E4EFE9; --st-ativo-tx:#245646;
    --st-pausado-bg:#F6ECD9; --st-pausado-tx:#8A5A12;
    --st-conc-bg:#E7EBE9; --st-conc-tx:#6B7A73;
    --toast-bg:#1B2A25; --toast-tx:#EAF3EF;
    --shadow:0 1px 2px rgba(27,42,37,.06),0 4px 14px rgba(27,42,37,.05);
    --shadow-lift:0 6px 22px rgba(27,42,37,.14);
    --radius:12px;
  }
  [data-theme="dark"]{
    --bg:#12140D; --surface:#1C1F16; --column:#22261B;
    --ink:#E8EBDF; --muted:#9AA48C; --line:#333829;
    --pine:#5FA88E; --pine-deep:#7CBFA6; --amber:#D89B4A; --clay:#D46A52;
    --on-pine:#0E120C;
    --input-bg:#161911; --sel:#2E4A3F;
    --chip-bg:#282D20; --chip-tx:#9AA48C;
    --ok-bg:#1E3229; --ok-tx:#8FCFB4;
    --soon-bg:#33291A; --soon-tx:#E0B26A;
    --late-bg:#3A231D; --late-tx:#E79683;
    --st-ativo-bg:#1E3229; --st-ativo-tx:#8FCFB4;
    --st-pausado-bg:#33291A; --st-pausado-tx:#E0B26A;
    --st-conc-bg:#2A2E22; --st-conc-tx:#9AA48C;
    --toast-bg:#E8EBDF; --toast-tx:#12140D;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 14px rgba(0,0,0,.3);
    --shadow-lift:0 6px 22px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:"IBM Plex Sans",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;transition:background .2s,color .2s}
  button{font-family:inherit;cursor:pointer}
  ::selection{background:var(--sel)}

  /* ---------- Top bar ---------- */
  header{display:flex;align-items:center;gap:18px;padding:14px 26px;background:var(--surface);
    border-bottom:1px solid var(--line);flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .brand-logo{height:34px;width:auto;display:block;object-fit:contain}
  .logo-dark{display:none}
  [data-theme="dark"] .logo-light{display:none}
  [data-theme="dark"] .logo-dark{display:block}
  .mark{width:34px;height:34px;border-radius:9px;flex:none;background:var(--pine);position:relative}
  .mark::before,.mark::after{content:"";position:absolute;background:var(--on-pine);border-radius:2px}
  .mark::before{left:8px;top:8px;width:7px;height:18px}
  .mark::after{left:19px;top:8px;width:7px;height:11px}
  .brand h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:19px;letter-spacing:-.01em;margin:0;line-height:1.1}
  .brand span{display:block;font-size:11.5px;color:var(--muted);font-weight:500;letter-spacing:.02em}

  .tabs{display:flex;background:var(--column);border-radius:10px;padding:3px;gap:2px}
  .tab{border:none;background:transparent;color:var(--muted);font-size:13.5px;font-weight:600;
    padding:7px 16px;border-radius:8px;transition:.14s}
  .tab.active{background:var(--surface);color:var(--pine-deep);box-shadow:var(--shadow)}

  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
  .btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:9px 14px;
    border-radius:9px;font-size:13.5px;font-weight:500;display:inline-flex;align-items:center;gap:7px;transition:.14s}
  .btn:hover{border-color:var(--pine);color:var(--pine-deep)}
  .btn.primary{background:var(--pine);border-color:var(--pine);color:var(--on-pine)}
  .btn.primary:hover{background:var(--pine-deep);color:#fff}
  .btn.ghost{border-color:transparent;background:transparent}
  .btn.ghost:hover{background:var(--column)}
  .btn svg{width:15px;height:15px}
  .btn.sm{padding:6px 11px;font-size:12.5px}

  /* ---------- Main / scroll region ---------- */
  main{flex:1;overflow-y:auto}
  .wrap{max-width:1120px;margin:0 auto;padding:26px}
  .page-head{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .page-head h2{font-family:"Space Grotesk",sans-serif;font-size:22px;margin:0;letter-spacing:-.01em}
  .page-head .sub{color:var(--muted);font-size:13.5px}
  .crumb{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--muted);margin-bottom:14px}
  .crumb a{color:var(--pine-deep);font-weight:600;text-decoration:none;cursor:pointer}
  .crumb a:hover{text-decoration:underline}

  /* ---------- Projects grid ---------- */
  .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .proj-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);
    border-top:4px solid var(--pine);padding:18px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:12px;position:relative}
  .proj-card:hover{box-shadow:var(--shadow-lift);transform:translateY(-2px)}
  .proj-top{display:flex;align-items:flex-start;gap:10px}
  .proj-name{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:16.5px;margin:0;line-height:1.25;flex:1;word-break:break-word}
  .proj-desc{font-size:13px;color:var(--muted);line-height:1.45;margin:0}
  .status{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .status.ativo{background:var(--st-ativo-bg);color:var(--st-ativo-tx)}
  .status.pausado{background:var(--st-pausado-bg);color:var(--st-pausado-tx)}
  .status.concluido{background:var(--st-conc-bg);color:var(--st-conc-tx)}
  .bar{height:6px;background:var(--column);border-radius:20px;overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--pine);border-radius:20px;transition:width .3s}
  .proj-meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted)}
  .proj-meta .chip{margin:0}
  .proj-edit{position:absolute;top:12px;right:12px;opacity:0;transition:.14s}
  .proj-card:hover .proj-edit{opacity:1}

  .new-tile{border:1.5px dashed var(--line);background:transparent;border-radius:var(--radius);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    min-height:150px;color:var(--muted);font-weight:600;font-size:14px;transition:.15s}
  .new-tile:hover{border-color:var(--pine);color:var(--pine-deep);background:var(--surface)}
  .new-tile svg{width:26px;height:26px}

  /* ---------- Board (project detail) ---------- */
  .board{display:flex;gap:18px;align-items:flex-start;overflow-x:auto;padding-bottom:6px}
  .col{background:var(--column);border-radius:var(--radius);width:320px;flex:none;display:flex;flex-direction:column;
    border:1px solid transparent;transition:.14s}
  .col.drag-over{border-color:var(--pine);background:var(--sel)}
  .col-head{display:flex;align-items:center;gap:9px;padding:14px 15px 10px}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .col-title{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:14px}
  .count{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--muted);
    background:var(--surface);border-radius:20px;padding:2px 9px}
  .col-body{padding:4px 12px 14px;display:flex;flex-direction:column;gap:10px;min-height:60px}

  .card{background:var(--surface);border-radius:10px;padding:13px 14px;box-shadow:var(--shadow);
    border-left:3px solid var(--pine);cursor:grab;transition:.14s;position:relative}
  .card:hover{box-shadow:var(--shadow-lift)}
  .card.dragging{opacity:.4;cursor:grabbing}
  .card.p-alta{border-left-color:var(--clay)}
  .card.p-media{border-left-color:var(--amber)}
  .card.p-baixa{border-left-color:var(--pine)}
  .card-title{font-weight:600;font-size:14.5px;line-height:1.35;margin:0 0 4px;word-break:break-word}
  .card-desc{font-size:12.8px;color:var(--muted);line-height:1.45;margin:0 0 10px;white-space:pre-wrap;word-break:break-word}
  .card-foot{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .chip{font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;
    display:inline-flex;align-items:center;gap:5px;background:var(--chip-bg);color:var(--chip-tx)}
  .chip.due-ok{background:var(--ok-bg);color:var(--ok-tx)}
  .chip.due-soon{background:var(--soon-bg);color:var(--soon-tx)}
  .chip.due-late{background:var(--late-bg);color:var(--late-tx)}
  .tag-prio{font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:6px}
  .tag-prio.p-alta{background:var(--late-bg);color:var(--late-tx)}
  .tag-prio.p-media{background:var(--soon-bg);color:var(--soon-tx)}
  .tag-prio.p-baixa{background:var(--ok-bg);color:var(--ok-tx)}
  .card-actions{position:absolute;top:9px;right:9px;display:flex;gap:4px;opacity:0;transition:.14s}
  .card:hover .card-actions{opacity:1}
  .icon-btn{width:26px;height:26px;border:none;background:var(--chip-bg);border-radius:7px;display:grid;place-items:center;color:var(--muted)}
  .icon-btn:hover{background:var(--pine);color:#fff}
  .icon-btn svg{width:13px;height:13px}
  .add-card{border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:500;
    padding:8px 6px;border-radius:8px;text-align:left;display:flex;align-items:center;gap:6px}
  .add-card:hover{background:var(--surface);color:var(--pine-deep)}

  .empty{color:var(--muted);font-size:12.5px;text-align:center;padding:18px 10px;
    border:1px dashed var(--line);border-radius:9px;line-height:1.5}
  .empty-big{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty-big h3{font-family:"Space Grotesk",sans-serif;color:var(--ink);margin:0 0 6px;font-size:18px}

  /* ---------- Agenda ---------- */
  .agenda-group{margin-bottom:24px}
  .agenda-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .agenda-head h3{font-family:"Space Grotesk",sans-serif;font-size:14px;margin:0;text-transform:uppercase;letter-spacing:.05em}
  .agenda-head .count{margin-left:0}
  .agenda-head .rule{flex:1;height:1px;background:var(--line)}
  .agenda-row{display:flex;align-items:center;gap:14px;background:var(--surface);border-radius:10px;
    padding:13px 16px;box-shadow:var(--shadow);border-left:3px solid var(--pine);margin-bottom:9px;cursor:pointer;transition:.14s}
  .agenda-row:hover{box-shadow:var(--shadow-lift)}
  .agenda-row.p-alta{border-left-color:var(--clay)}
  .agenda-row.p-media{border-left-color:var(--amber)}
  .agenda-main{flex:1;min-width:0}
  .agenda-title{font-weight:600;font-size:14.5px;margin:0 0 3px;word-break:break-word}
  .agenda-proj{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
  .pdot{width:8px;height:8px;border-radius:50%;flex:none}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(27,42,37,.38);backdrop-filter:blur(2px);
    display:none;align-items:center;justify-content:center;padding:20px;z-index:40}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:16px;width:100%;max-width:460px;box-shadow:var(--shadow-lift);overflow:hidden}
  .modal-head{padding:18px 22px 4px}
  .modal-head h2{font-family:"Space Grotesk",sans-serif;font-size:17px;margin:0}
  .modal-body{padding:14px 22px 6px;display:flex;flex-direction:column;gap:14px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.02em}
  .field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;
    font-family:inherit;font-size:14px;color:var(--ink);background:var(--input-bg);transition:.14s}
  .field textarea{resize:vertical;min-height:60px}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--pine);box-shadow:0 0 0 3px rgba(47,111,94,.14)}
  .row{display:flex;gap:12px}
  .row .field{flex:1}
  .switch-row{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:9px;padding:10px 12px;cursor:pointer;user-select:none}
  .switch-row input{display:none}
  .switch{width:38px;height:22px;border-radius:99px;background:var(--line);position:relative;flex:none;transition:background .15s}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .switch-row input:checked+.switch{background:var(--pine)}
  .switch-row input:checked+.switch::after{left:19px}
  .switch-row input:disabled+.switch{opacity:.55}
  .switch-row input:disabled~*{cursor:default}
  .switch-txt{display:flex;flex-direction:column;gap:2px;min-width:0}
  .switch-txt b{font-size:13px}
  .switch-txt span{font-size:12px;color:var(--muted)}
  .swatches{display:flex;gap:8px}
  .color-pick{display:flex;align-items:center;gap:10px}
  .color-dot{width:30px;height:30px;border-radius:8px;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
  .swatch{width:30px;height:30px;border-radius:8px;border:2px solid transparent;cursor:pointer}
  .swatch.sel{border-color:var(--ink);box-shadow:0 0 0 2px var(--surface) inset}
  .modal-foot{padding:16px 22px 20px;display:flex;gap:9px;justify-content:space-between;align-items:center}
  .modal-foot .right{display:flex;gap:9px;margin-left:auto}
  .link-danger{border:none;background:none;color:var(--clay);font-size:13px;font-weight:600;padding:6px 4px}
  .link-danger:hover{text-decoration:underline}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--toast-bg);
    color:var(--toast-tx);padding:11px 18px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow-lift);
    opacity:0;pointer-events:none;transition:.22s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- operator avatar ---------- */
  .op{width:24px;height:24px;border-radius:50%;flex:none;color:#fff;font-size:10.5px;font-weight:700;
    display:inline-grid;place-items:center;letter-spacing:.02em;box-shadow:0 0 0 2px var(--surface)}

  /* ---------- quick complete / badges / collapse ---------- */
  .check{width:20px;height:20px;border-radius:50%;flex:none;border:1.6px solid var(--line);
    background:transparent;color:#fff;display:inline-grid;place-items:center;padding:0;transition:.14s}
  .check:hover{border-color:var(--pine);background:var(--ok-bg)}
  .check.done{background:var(--pine);border-color:var(--pine)}
  .card-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:4px}
  .card-row .card-title{margin:0;padding-right:44px}
  .card.is-done .card-title{text-decoration:line-through;color:var(--muted)}
  .card.is-done{opacity:.75}
  .tab-badge{display:inline-grid;place-items:center;min-width:17px;height:17px;padding:0 5px;margin-left:7px;
    border-radius:20px;background:var(--clay);color:#fff;font-size:10.5px;font-weight:700;line-height:1;vertical-align:1px}
  .late-b{color:var(--late-tx);font-weight:600}
  .group-head{border:none;background:transparent;width:100%;padding:0;color:inherit;cursor:pointer;text-align:left}
  .group-head:hover h3{color:var(--pine-deep)}
  .caret{display:inline-block;font-size:12px;color:var(--muted);transition:transform .15s;margin-right:2px}
  .caret.closed{transform:rotate(-90deg)}

  /* ---------- project groups ---------- */
  .proj-section{margin-bottom:26px}
  .group-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .group-head h3{font-family:"Space Grotesk",sans-serif;font-size:14px;margin:0;text-transform:uppercase;letter-spacing:.05em}
  .group-head .count{margin-left:0}
  .group-head .rule{flex:1;height:1px;background:var(--line)}

  /* ---------- sector bar ---------- */
  .sector-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;flex-wrap:wrap}
  .sector-chip{border:1px solid var(--line);background:var(--surface);color:var(--muted);
    padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap;transition:.14s}
  .sector-chip:hover{border-color:var(--pine);color:var(--pine-deep)}
  .sector-chip.active{background:var(--pine);border-color:var(--pine);color:var(--on-pine)}
  .sector-chip.add{border-style:dashed;color:var(--muted)}
  .sec-tag{background:var(--column);color:var(--muted)}

  /* ---------- agenda filters ---------- */
  .filters{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:22px}
  .filter label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:.02em}
  .filter select{border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-family:inherit;font-size:13.5px;
    color:var(--ink);background:var(--input-bg);min-width:190px}
  .filter select:focus{outline:none;border-color:var(--pine);box-shadow:0 0 0 3px rgba(47,111,94,.14)}

  /* ---------- team modal ---------- */
  .op-hint{font-size:12.5px;color:var(--muted);line-height:1.5;margin:0}
  .team-list{display:flex;flex-direction:column;gap:8px}
  .op-row{display:flex;align-items:center;gap:11px;background:var(--input-bg);border:1px solid var(--line);
    border-radius:10px;padding:9px 12px}
  .op-name{font-weight:600;font-size:14px}
  .op-you{font-size:10.5px;font-weight:600;color:var(--muted);background:var(--column);padding:2px 7px;border-radius:20px;margin-left:4px}
  .op-count{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--muted)}
  .op-add{display:flex;gap:8px}
  .op-add input{flex:1;border:1px solid var(--line);border-radius:9px;padding:10px 12px;
    font-family:inherit;font-size:14px;color:var(--ink);background:var(--input-bg)}
  .op-add input:focus{outline:none;border-color:var(--pine);box-shadow:0 0 0 3px rgba(47,111,94,.14)}

  @media (max-width:640px){
    header{padding:12px 16px}.wrap{padding:16px}.col{width:82vw}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  :focus-visible{outline:2px solid var(--pine);outline-offset:2px}
</style>

    width:100%;max-width:400px;padding:30px 28px;display:flex;flex-direction:column;gap:16px}

<script>
(function(){
  "use strict";

  // ============================================================
  // CONFIGURAÇÃO — cole aqui os dados do seu projeto Supabase
  // (Painel do Supabase → Settings → API)
  // ============================================================
  const SUPABASE_URL = "https://mpvtsvelqjijixqqvqgh.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_JmcYsRM4YRvuMnCYomORIA_youu3J9F";
  // ============================================================

  const STAGES = [
    {id:"todo",  title:"A fazer",      color:"#8A98A2"},
    {id:"doing", title:"Em andamento", color:"#C07A24"},
    {id:"done",  title:"Concluído",    color:"#2F6F5E"}
  ];
  const PRIO_W={alta:0,media:1,baixa:2};

  // ---------- theme ----------
  const THEME_KEY="organizador.theme";
  const SUN=`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2m0 16v2M4 12H2m20 0h-2M5.6 5.6 4.2 4.2m15.6 15.6-1.4-1.4M18.4 5.6l1.4-1.4M4.2 19.8l1.4-1.4"/></svg>`;
  const MOON=`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z"/></svg>`;
  function applyTheme(t){
    document.documentElement.setAttribute("data-theme", t);
    const b=document.getElementById("btn-theme"); if(b) b.innerHTML = t==="dark"?SUN:MOON;
  }
  (function initTheme(){
    let t; try{ t=localStorage.getItem(THEME_KEY); }catch(e){}
    if(!t) t=(window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";
    applyTheme(t);
  })();
  document.getElementById("btn-theme").addEventListener("click",()=>{
    const next=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
    applyTheme(next); try{ localStorage.setItem(THEME_KEY,next); }catch(e){}
  });

  // ---------- state ----------
  let sb=null, session=null, me=null;
  let data={profiles:[],projects:[],tasks:[],access:[]};
  let state={view:"projects",projectId:null,sector:"overview",filterProject:"all",filterOperator:"all",filterPrio:"all",filterSector:"all"};
  let modal={type:null,id:null,ctx:null,color:null};
  let authMode="login";

  const configured = SUPABASE_URL.startsWith("http") && SUPABASE_ANON_KEY.length>20;
  const isAdmin = ()=> me && me.role==="admin";
  const canManageProject = p => isAdmin() || (p && p.private && me && p.owner_id===me.id);
  const canEditTask = t => isAdmin() || (me && t.operator_id===me.id) || canManageProject(projById(t.projectId));
  const activeProfiles = ()=> data.profiles.filter(u=>u.approved||u.role==="admin");

  // ---------- data access ----------
  async function loadAll(){
    const [pr,pj,tk,pa]=await Promise.all([
      sb.from("profiles").select("*"),
      sb.from("projects").select("*"),
      sb.from("tasks").select("*"),
      sb.from("project_access").select("*")
    ]);
    if(pr.error||pj.error||tk.error||pa.error){ toast("Erro ao carregar dados"); console.error(pr.error||pj.error||tk.error||pa.error); return; }
    data.profiles=pr.data||[];
    data.access=pa.data||[];
    data.projects=(pj.data||[]).map(p=>({...p,desc:p.description||"",subprojects:Array.isArray(p.subprojects)?p.subprojects:[]}));
    const byId={}; data.profiles.forEach(u=>byId[u.id]=u);
    data.tasks=(tk.data||[]).map(t=>({...t,desc:t.description||"",projectId:t.project_id,
      subprojectId:t.subproject_id||"",due:t.due||"",operator:(byId[t.operator_id]||{}).name||"—"}));
    me=byId[session.user.id]||null;
  }
  async function refresh(){ if(!session) return; await loadAll(); routeAfterLoad(); }
  function dbErr(e){ if(e){ toast(e.message&&/policy|denied|permission/i.test(e.message)?"Sem permissão para essa ação":"Erro ao salvar"); console.error(e); return true; } return false; }

  // ---------- helpers ----------
  const tasksOf = pid => data.tasks.filter(t=>t.projectId===pid);
  const projById = pid => data.projects.find(p=>p.id===pid);
  const subById = (p,sid) => (p&&p.subprojects||[]).find(s=>s.id===sid);
  function sectorName(p,sid){ const s=subById(p,sid); return s?s.name:(sid?"?":"Sem setor"); }
  function initials(name){ return String(name||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
  function opColor(u){ const name=typeof u==="string"?u:(u&&u.name)||"?";
    let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))%360; return `hsl(${h} 42% 48%)`; }
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
  function sortTasks(arr){
    return arr.slice().sort((a,b)=>{
      const da=a.due||"9999-12-31", db=b.due||"9999-12-31";
      if(da!==db) return da<db?-1:1;
      if(PRIO_W[a.prio]!==PRIO_W[b.prio]) return PRIO_W[a.prio]-PRIO_W[b.prio];
      return a.title.localeCompare(b.title);
    });
  }
  const lateCount = arr => arr.filter(t=>t.col!=="done"&&t.due&&daysTo(t.due)<0).length;
  function daysTo(due){ if(!due) return null; const today=new Date();today.setHours(0,0,0,0);
    return Math.round((new Date(due+"T00:00:00")-today)/86400000); }
  function dueInfo(due){ const diff=daysTo(due);
    if(diff===null) return {text:"sem prazo",cls:""};
    if(diff<0)  return {text:`atrasado ${Math.abs(diff)}d`,cls:"due-late"};
    if(diff===0)return {text:"vence hoje",cls:"due-soon"};
    if(diff===1)return {text:"falta 1 dia",cls:"due-soon"};
    if(diff<=3) return {text:`faltam ${diff} dias`,cls:"due-soon"};
    const d=new Date(due+"T00:00:00");
    return {text:d.toLocaleDateString("pt-BR",{day:"2-digit",month:"short"}),cls:"due-ok"}; }

  // cor automática de projeto (matiz mais distante das existentes)
  const PROJ_S=0.52, PROJ_L=0.44;
  function hexHue(hex){ const m=/^#?([0-9a-f]{6})$/i.exec(hex||""); if(!m) return null;
    const n=parseInt(m[1],16),r=(n>>16&255)/255,g=(n>>8&255)/255,b=(n&255)/255;
    const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn; if(d<1e-6) return null;
    let h; if(mx===r)h=((g-b)/d)%6; else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; return (h%360+360)%360; }
  function hslToHex(h,s,l){ h=((h%360)+360)%360; const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2;
    let r,g,b; if(h<60)[r,g,b]=[c,x,0]; else if(h<120)[r,g,b]=[x,c,0]; else if(h<180)[r,g,b]=[0,c,x];
    else if(h<240)[r,g,b]=[0,x,c]; else if(h<300)[r,g,b]=[x,0,c]; else [r,g,b]=[c,0,x];
    const to=v=>Math.round((v+m)*255).toString(16).padStart(2,"0"); return "#"+to(r)+to(g)+to(b); }
  function pickProjectColor(){
    const used=data.projects.map(p=>hexHue(p.color)).filter(h=>h!=null);
    if(!used.length) return hslToHex(Math.random()*360,PROJ_S,PROJ_L);
    let best=[],bestDist=-1;
    for(let i=0;i<72;i++){ const h=i*5; let md=Infinity;
      used.forEach(u=>{ let dd=Math.abs(h-u)%360; dd=Math.min(dd,360-dd); if(dd<md)md=dd; });
      if(md>bestDist+0.5){bestDist=md;best=[h];} else if(md>=bestDist-0.5){best.push(h);} }
    return hslToHex(best[Math.floor(Math.random()*best.length)]+(Math.random()*8-4),PROJ_S,PROJ_L);
  }

  // ui persistido (seções recolhidas)
  let ui={collapsed:{concluido:true}};
  try{ const raw=localStorage.getItem("organizador.ui"); if(raw){const u=JSON.parse(raw); if(u&&u.collapsed) ui=u;} }catch(e){}
  function saveUi(){ try{ localStorage.setItem("organizador.ui",JSON.stringify(ui)); }catch(e){} }

  // ---------- boot ----------
  const viewEl=document.getElementById("view");
  const headerEl=document.getElementById("app-header");

  function boot(){
    if(!configured){ renderSetup(); return; }
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    sb.auth.onAuthStateChange((_ev,s)=>{ session=s; onSession(); });
    sb.auth.getSession().then(({data:d})=>{ session=d.session; onSession(); });
  }
  let realtimeOn=false, rtTimer=null;
  async function onSession(){
    if(!session){ headerEl.style.display="none"; renderAuth(); return; }
    await loadAll();
    ensureRealtime();
    routeAfterLoad();
  }
  function ensureRealtime(){
    if(realtimeOn) return;
    realtimeOn=true;
    sb.channel("db-changes")
      .on("postgres_changes",{event:"*",schema:"public"},()=>{
        clearTimeout(rtTimer); rtTimer=setTimeout(refresh,400);
      }).subscribe();
  }
  function routeAfterLoad(){
    if(!me || (me.role!=="admin" && !me.approved)){ headerEl.style.display="none"; renderPending(); return; }
    headerEl.style.display="";
    document.getElementById("user-email").textContent=(me&&me.name)||session.user.email;
    document.getElementById("user-avatar").textContent=initials((me&&me.name)||session.user.email);
    document.getElementById("user-avatar").style.background=opColor((me&&me.name)||session.user.email);
    document.getElementById("user-role").textContent=isAdmin()?"admin":"operador";
    render();
  }

    const go=async()=>{
      const email=card.querySelector("#a-email").value.trim();
      const pass=card.querySelector("#a-pass").value;
      const err=card.querySelector("#a-err"); err.classList.remove("show");
      if(!email||!pass){ err.textContent="Preencha email e senha."; err.classList.add("show"); return; }
      try{
        if(isLogin){
          const {error}=await sb.auth.signInWithPassword({email,password:pass});
          if(error){ err.textContent="Não foi possível entrar: "+error.message; err.classList.add("show"); }
        }else{
          const name=(card.querySelector("#a-name").value||"").trim()||email.split("@")[0];
          const {error}=await sb.auth.signUp({email,password:pass,options:{data:{name}}});
          if(error){ err.textContent="Não foi possível criar a conta: "+error.message; err.classList.add("show"); }
          else{ authMode="login"; renderAuth("Conta criada! Se a confirmação por email estiver ativa, verifique sua caixa de entrada antes de entrar. Depois de entrar, aguarde um administrador liberar seu acesso."); }
        }
      }catch(e){ err.textContent="Falha de conexão. Verifique a internet e a configuração."; err.classList.add("show"); }
    };
    card.querySelector("#a-go").addEventListener("click",go);
    card.querySelector("#a-pass").addEventListener("keydown",e=>{if(e.key==="Enter")go();});

  function renderPending(){
    viewEl.innerHTML="";
    const card=el(`<div class="auth-wrap"><div class="auth-card">
      <h2 class="auth-title">Aguardando aprovação</h2>
      <p class="auth-sub">Sua conta foi criada, mas um administrador ainda precisa liberar seu acesso. Esta tela atualiza sozinha assim que a liberação acontecer.</p>
      <button class="btn primary" id="p-check" style="justify-content:center">Verificar agora</button>
      <button class="auth-switch" id="p-logout">Sair</button>
    </div></div>`);
    viewEl.appendChild(card);
    card.querySelector("#p-check").addEventListener("click",refresh);
    card.querySelector("#p-logout").addEventListener("click",async()=>{ await sb.auth.signOut(); });
  }

  document.getElementById("btn-logout").addEventListener("click",async()=>{ await sb.auth.signOut(); });

  // ---------- router / render ----------
  function openProjectView(pid){
    const p=projById(pid);
    state.projectId=pid;
    state.sector=(p&&p.subprojects&&p.subprojects.length)?"overview":"all";
    state.view="project"; render();
  }
  function setView(v,pid){ state.view=v; if(pid!==undefined) state.projectId=pid; render(); }
  document.getElementById("tabs").addEventListener("click",e=>{
    const b=e.target.closest(".tab"); if(!b) return; setView(b.dataset.view,null);
  });

  function render(){
    if(!session) return;
    document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",
      t.dataset.view===(state.view==="project"?"projects":state.view)));
    const late=lateCount(data.tasks), badge=document.getElementById("badge-agenda");
    if(badge){ badge.textContent=late; badge.style.display=late?"inline-grid":"none"; }
    viewEl.innerHTML="";
    if(state.view==="projects") renderProjects(viewEl);
    else if(state.view==="project") renderBoard(viewEl);
    else renderAgenda(viewEl);
  }

  // ---------- view: projects ----------
  function projCardEl(p){
    const ts=tasksOf(p.id), done=ts.filter(t=>t.col==="done").length;
    const pct=ts.length?Math.round(done/ts.length*100):0;
    const late=lateCount(ts);
    const next=ts.filter(t=>t.col!=="done"&&t.due).sort((a,b)=>a.due<b.due?-1:1)[0];
    const nd=next?dueInfo(next.due):null;
    const c=el(`<div class="proj-card" style="border-top-color:${p.color}">
      ${canManageProject(p)?`<button class="btn ghost sm proj-edit" data-edit>✎</button>`:""}
      <div class="proj-top">
        <h3 class="proj-name">${esc(p.name)}</h3>
        ${p.private?`<span class="chip" title="Só você e admins veem">🔒</span>`:""}
        <span class="status ${p.status}">${{ativo:"Ativo",pausado:"Pausado",concluido:"Concluído"}[p.status]}</span>
      </div>
      ${p.desc?`<p class="proj-desc">${esc(p.desc)}</p>`:""}
      <div class="bar"><i style="width:${pct}%;background:${p.color}"></i></div>
      <div class="proj-meta">
        <span>${done}/${ts.length} concluídas${p.subprojects.length?` · ${p.subprojects.length} setor(es)`:""}</span>
        <span style="display:flex;gap:6px">
        ${late?`<span class="chip due-late">${late} atrasada${late>1?"s":""}</span>`:""}
        ${nd?`<span class="chip ${nd.cls}">próx.: ${nd.text}</span>`:`<span class="chip">sem prazos</span>`}
        </span>
      </div>
    </div>`);
    c.addEventListener("click",e=>{ if(e.target.closest("[data-edit]")){openProject(p.id);return;} openProjectView(p.id); });
    return c;
  }

  function renderProjects(root){
    const pend=data.tasks.filter(t=>t.col!=="done").length;
    const late=lateCount(data.tasks);
    const head=el(`<div class="page-head"><h2>Projetos</h2>
      <span class="sub">${data.projects.length} projeto(s) · ${pend} pendente(s)${late?` · <b class="late-b">${late} atrasada(s)</b>`:""}</span>
      <button class="btn sm" id="btn-team" style="margin-left:auto">👥 Equipe (${data.profiles.length})</button></div>`);
    head.querySelector("#btn-team").addEventListener("click",openTeam);
    root.appendChild(head);

    const groups=[
      {status:"ativo",label:"Ativos"},
      {status:"pausado",label:"Pausados"},
      {status:"concluido",label:"Concluídos"}
    ];
    groups.forEach(g=>{
      const items=data.projects.filter(p=>p.status===g.status);
      if(g.status!=="ativo" && !items.length) return;
      const collapsed=!!ui.collapsed[g.status];
      const sec=el(`<div class="proj-section"><button class="group-head" aria-expanded="${!collapsed}">
        <span class="caret ${collapsed?"closed":""}">▾</span>
        <h3>${g.label}</h3><span class="count">${items.length}</span><span class="rule"></span></button>
        <div class="proj-grid" ${collapsed?"style=display:none":""}></div></div>`);
      sec.querySelector(".group-head").addEventListener("click",()=>{
        ui.collapsed[g.status]=!ui.collapsed[g.status]; saveUi(); render();
      });
      const grid=sec.querySelector(".proj-grid");
      items.forEach(p=>grid.appendChild(projCardEl(p)));
      if(g.status==="ativo"){
        const tile=el(`<button class="new-tile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          ${isAdmin()?"Novo projeto":"Novo projeto privado"}</button>`);
        tile.addEventListener("click",()=>openProject(null));
        grid.appendChild(tile);
      }
      root.appendChild(sec);
    });
  }

  // ---------- view: project board ----------
  function sectorTasks(p){
    if(state.sector==="all") return tasksOf(p.id);
    if(state.sector==="none") return tasksOf(p.id).filter(t=>!t.subprojectId);
    if(state.sector==="overview") return [];
    return tasksOf(p.id).filter(t=>t.subprojectId===state.sector);
  }
  function newTaskSub(){
    return (state.sector!=="all"&&state.sector!=="none"&&state.sector!=="overview")?state.sector:"";
  }

  function renderBoard(root){
    const p=projById(state.projectId);
    if(!p){ setView("projects"); return; }
    const hasSubs=p.subprojects.length>0;

    let crumb=`<a id="back">← Projetos</a> / `;
    if(hasSubs && state.sector!=="overview") crumb+=`<a id="toproj">${esc(p.name)}</a> / <span>${state.sector==="all"?"Todas as tarefas":state.sector==="none"?"Sem setor":esc(sectorName(p,state.sector))}</span>`;
    else crumb+=`<span>${esc(p.name)}</span>`;
    const cr=el(`<div class="crumb">${crumb}</div>`);
    cr.querySelector("#back").addEventListener("click",()=>setView("projects"));
    if(cr.querySelector("#toproj")) cr.querySelector("#toproj").addEventListener("click",()=>{state.sector="overview";render();});
    root.appendChild(cr);

    const head=el(`<div class="page-head">
      <span class="dot" style="width:14px;height:14px;background:${p.color}"></span>
      <h2>${esc(p.name)}</h2>
      ${p.private?`<span class="chip" title="Só você e admins veem">🔒 privado</span>`:""}
      <span class="status ${p.status}">${{ativo:"Ativo",pausado:"Pausado",concluido:"Concluído"}[p.status]}</span>
      <div style="margin-left:auto;display:flex;gap:8px">
        ${canManageProject(p)?`<button class="btn sm" id="edit-proj">Editar projeto</button>`:""}
        <button class="btn sm primary" id="new-task">＋ Nova tarefa</button>
      </div></div>`);
    root.appendChild(head);
    if(canManageProject(p)) head.querySelector("#edit-proj").addEventListener("click",()=>openProject(p.id));
    head.querySelector("#new-task").addEventListener("click",()=>openTask(null,{projectId:p.id,col:"todo",subprojectId:newTaskSub()}));

    const bar=el(`<div class="sector-bar"></div>`);
    const chip=(label,key)=>{
      const b=el(`<button class="sector-chip ${state.sector===key?"active":""}">${label}</button>`);
      b.addEventListener("click",()=>{state.sector=key;render();});
      return b;
    };
    if(hasSubs){
      bar.appendChild(chip("Visão geral","overview"));
      bar.appendChild(chip("Todas as tarefas","all"));
      p.subprojects.forEach(s=>bar.appendChild(chip(esc(s.name),s.id)));
      if(tasksOf(p.id).some(t=>!t.subprojectId)) bar.appendChild(chip("Sem setor","none"));
    }
    if(isAdmin()){
      const addSec=el(`<button class="sector-chip add" title="Criar setor">＋ Setor</button>`);
      addSec.addEventListener("click",()=>openSector(p.id,null));
      bar.appendChild(addSec);
    }
    if(bar.children.length) root.appendChild(bar);

    if(state.sector==="overview"){ renderSectorOverview(root,p); return; }

    const showSector = state.sector==="all" && hasSubs;
    const board=el(`<div class="board"></div>`);
    STAGES.forEach(s=>{
      const items=sortTasks(sectorTasks(p).filter(t=>t.col===s.id));
      const col=el(`<section class="col" data-col="${s.id}">
        <div class="col-head"><span class="dot" style="background:${s.color}"></span>
          <span class="col-title">${s.title}</span><span class="count">${items.length}</span></div>
        <div class="col-body"></div></section>`);
      const body=col.querySelector(".col-body");
      if(!items.length) body.appendChild(el(`<div class="empty">Sem tarefas aqui.</div>`));
      items.forEach(t=>body.appendChild(cardEl(t,{showSector})));
      {
        const add=el(`<button class="add-card">＋ Adicionar tarefa</button>`);
        add.addEventListener("click",()=>openTask(null,{projectId:p.id,col:s.id,subprojectId:newTaskSub()}));
        body.appendChild(add);
      }
      col.addEventListener("dragover",e=>{e.preventDefault();col.classList.add("drag-over");});
      col.addEventListener("dragleave",()=>col.classList.remove("drag-over"));
      col.addEventListener("drop",async e=>{e.preventDefault();col.classList.remove("drag-over");
        const t=data.tasks.find(x=>x.id===e.dataTransfer.getData("text/plain"));
        if(t&&t.col!==s.id){
          const {error}=await sb.from("tasks").update({col:s.id}).eq("id",t.id);
          if(!dbErr(error)) await refresh();
        }});
      board.appendChild(col);
    });
    root.appendChild(board);
  }

  function renderSectorOverview(root,p){
    root.appendChild(el(`<p class="op-hint" style="margin-bottom:14px">Visão global por setor. Clique em um setor para abrir seu quadro.</p>`));
    const grid=el(`<div class="proj-grid"></div>`);
    const sectorCardEl=(sid,name,editable)=>{
      const ts = sid==="none"?tasksOf(p.id).filter(t=>!t.subprojectId):tasksOf(p.id).filter(t=>t.subprojectId===sid);
      const done=ts.filter(t=>t.col==="done").length, pct=ts.length?Math.round(done/ts.length*100):0;
      const next=ts.filter(t=>t.col!=="done"&&t.due).sort((a,b)=>a.due<b.due?-1:1)[0];
      const nd=next?dueInfo(next.due):null;
      const late=lateCount(ts);
      const c=el(`<div class="proj-card" style="border-top-color:${p.color}">
        ${(editable&&canManageProject(p))?`<button class="btn ghost sm proj-edit" data-edit>✎</button>`:""}
        <div class="proj-top"><h3 class="proj-name">${esc(name)}</h3></div>
        <div class="bar"><i style="width:${pct}%;background:${p.color}"></i></div>
        <div class="proj-meta"><span>${done}/${ts.length} concluídas</span>
          <span style="display:flex;gap:6px">
          ${late?`<span class="chip due-late">${late} atrasada${late>1?"s":""}</span>`:""}
          ${nd?`<span class="chip ${nd.cls}">próx.: ${nd.text}</span>`:`<span class="chip">sem prazos</span>`}
          </span></div>
      </div>`);
      c.addEventListener("click",e=>{ if(e.target.closest("[data-edit]")){openSector(p.id,sid);return;} state.sector=sid;render(); });
      return c;
    };
    p.subprojects.forEach(s=>grid.appendChild(sectorCardEl(s.id,s.name,true)));
    if(tasksOf(p.id).some(t=>!t.subprojectId)) grid.appendChild(sectorCardEl("none","Sem setor",false));
    if(canManageProject(p)){
      const tile=el(`<button class="new-tile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Novo setor</button>`);
      tile.addEventListener("click",()=>openSector(p.id,null));
      grid.appendChild(tile);
    }
    root.appendChild(grid);
  }

  // ---------- cards ----------
  const CHECK_SVG=`<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>`;
  async function toggleDone(t){
    const next=t.col==="done"?"todo":"done";
    const {error}=await sb.from("tasks").update({col:next}).eq("id",t.id);
    if(!dbErr(error)){ toast(next==="done"?"Tarefa concluída ✓":"Tarefa reaberta"); await refresh(); }
  }

  function cardEl(t,opts){
    opts=opts||{};
    const d=dueInfo(t.due), pl={alta:"Alta",media:"Média",baixa:"Baixa"}[t.prio];
    const proj=projById(t.projectId);
    const done=t.col==="done", mine=canEditTask(t);
    const secTag=(opts.showSector)?`<span class="chip sec-tag">${t.subprojectId?esc(sectorName(proj,t.subprojectId)):"sem setor"}</span>`:"";
    const card=el(`<article class="card p-${t.prio} ${done?"is-done":""}" draggable="true" data-id="${t.id}">
      <div class="card-actions">
        ${mine?`<button class="icon-btn" data-act="edit" title="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>`:""}
        ${canManageProject(proj)?`<button class="icon-btn" data-act="del" title="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M9 7V4h6v3m-8 0l1 13h8l1-13"/></svg></button>`:""}
      </div>
      <div class="card-row">
        <button class="check ${done?"done":""}" data-act="check" title="${done?"Reabrir":"Concluir"}">${done?CHECK_SVG:""}</button>
        <h3 class="card-title">${esc(t.title)}</h3>
      </div>
      ${t.desc?`<p class="card-desc">${esc(t.desc)}</p>`:""}
      <div class="card-foot"><span class="tag-prio p-${t.prio}">${pl}</span>
        <span class="chip ${d.cls}">${d.text}</span>${secTag}
        <span class="op" title="${esc(t.operator)}" style="margin-left:auto;background:${opColor(t.operator)}">${esc(initials(t.operator))}</span>
      </div></article>`);
    card.addEventListener("dragstart",e=>{e.dataTransfer.setData("text/plain",t.id);card.classList.add("dragging");});
    card.addEventListener("dragend",()=>card.classList.remove("dragging"));
    card.querySelector('[data-act="check"]').addEventListener("click",e=>{e.stopPropagation();toggleDone(t);});
    if(mine){
      card.querySelector('[data-act="edit"]').addEventListener("click",()=>openTask(t.id));
    }
    if(canManageProject(proj)){
      card.querySelector('[data-act="del"]').addEventListener("click",async()=>{
        if(confirm(`Excluir "${t.title}"?`)){
          const {error}=await sb.from("tasks").delete().eq("id",t.id);
          if(!dbErr(error)){ toast("Tarefa excluída"); await refresh(); }
        }});
    }
    return card;
  }

  // ---------- view: agenda ----------
  function renderAgenda(root){
    root.appendChild(el(`<div class="page-head"><h2>Agenda</h2>
      <span class="sub">tarefas pendentes, por prazo</span></div>`));

    if(state.filterProject!=="all" && !data.projects.find(p=>p.id===state.filterProject)) state.filterProject="all";
    if(state.filterOperator!=="all" && !data.profiles.find(u=>u.id===state.filterOperator)) state.filterOperator="all";

    const secOpts=[];
    if(state.filterProject==="all"){
      data.projects.forEach(p=>p.subprojects.forEach(s=>secOpts.push({id:s.id,label:`${p.name} › ${s.name}`})));
    }else{
      const p=projById(state.filterProject);
      (p?p.subprojects:[]).forEach(s=>secOpts.push({id:s.id,label:s.name}));
    }
    const secIds=secOpts.map(o=>o.id);
    if(state.filterSector!=="all"&&state.filterSector!=="none"&&!secIds.includes(state.filterSector)) state.filterSector="all";

    const noFilters = state.filterProject==="all"&&state.filterOperator==="all"&&state.filterPrio==="all"&&state.filterSector==="all";
    const bar=el(`<div class="filters">
      <div class="filter"><label>Projeto</label><select id="flt-proj">
        <option value="all">Todos os projetos</option>
        ${data.projects.map(p=>`<option value="${p.id}" ${state.filterProject===p.id?"selected":""}>${esc(p.name)}</option>`).join("")}
      </select></div>
      <div class="filter"><label>Setor</label><select id="flt-sec">
        <option value="all">Todos os setores</option>
        <option value="none" ${state.filterSector==="none"?"selected":""}>Sem setor</option>
        ${secOpts.map(o=>`<option value="${o.id}" ${state.filterSector===o.id?"selected":""}>${esc(o.label)}</option>`).join("")}
      </select></div>
      <div class="filter"><label>Operador</label><select id="flt-op">
        <option value="all">Todos os operadores</option>
        ${activeProfiles().map(u=>`<option value="${u.id}" ${state.filterOperator===u.id?"selected":""}>${esc(u.name)}</option>`).join("")}
      </select></div>
      <div class="filter"><label>Prioridade</label><select id="flt-prio">
        <option value="all">Todas as prioridades</option>
        <option value="alta" ${state.filterPrio==="alta"?"selected":""}>Alta</option>
        <option value="media" ${state.filterPrio==="media"?"selected":""}>Média</option>
        <option value="baixa" ${state.filterPrio==="baixa"?"selected":""}>Baixa</option>
      </select></div>
      <button class="btn sm ghost" id="flt-clear" ${noFilters?"style=display:none":""}>Limpar filtros</button>
    </div>`);
    bar.querySelector("#flt-proj").addEventListener("change",e=>{state.filterProject=e.target.value;state.filterSector="all";render();});
    bar.querySelector("#flt-sec").addEventListener("change",e=>{state.filterSector=e.target.value;render();});
    bar.querySelector("#flt-op").addEventListener("change",e=>{state.filterOperator=e.target.value;render();});
    bar.querySelector("#flt-prio").addEventListener("change",e=>{state.filterPrio=e.target.value;render();});
    bar.querySelector("#flt-clear").addEventListener("click",()=>{state.filterProject="all";state.filterSector="all";state.filterOperator="all";state.filterPrio="all";render();});
    root.appendChild(bar);

    let pend=data.tasks.filter(t=>t.col!=="done");
    if(state.filterProject!=="all") pend=pend.filter(t=>t.projectId===state.filterProject);
    if(state.filterSector==="none") pend=pend.filter(t=>!t.subprojectId);
    else if(state.filterSector!=="all") pend=pend.filter(t=>t.subprojectId===state.filterSector);
    if(state.filterOperator!=="all") pend=pend.filter(t=>t.operator_id===state.filterOperator);
    if(state.filterPrio!=="all") pend=pend.filter(t=>t.prio===state.filterPrio);

    const groups=[
      {key:"late",title:"Atrasado",test:diff=>diff!==null&&diff<0},
      {key:"today",title:"Hoje",test:diff=>diff===0},
      {key:"week",title:"Próximos 7 dias",test:diff=>diff!==null&&diff>0&&diff<=7},
      {key:"later",title:"Mais adiante",test:diff=>diff!==null&&diff>7},
      {key:"none",title:"Sem prazo",test:diff=>diff===null}
    ];
    const withDiff=pend.map(t=>({t,diff:daysTo(t.due)})).sort((a,b)=>{
      if(a.diff===null) return 1; if(b.diff===null) return -1; return a.diff-b.diff; });
    let any=false;
    groups.forEach(g=>{
      const items=withDiff.filter(x=>g.test(x.diff)); if(!items.length) return; any=true;
      const gEl=el(`<div class="agenda-group"><div class="agenda-head">
        <h3>${g.title}</h3><span class="count">${items.length}</span><span class="rule"></span></div></div>`);
      items.forEach(({t})=>{
        const p=projById(t.projectId), d=dueInfo(t.due), mine=canEditTask(t);
        const row=el(`<div class="agenda-row p-${t.prio}">
          <button class="check" title="Concluir"></button>
          <span class="op" title="${esc(t.operator)}" style="background:${opColor(t.operator)}">${esc(initials(t.operator))}</span>
          <div class="agenda-main"><p class="agenda-title">${esc(t.title)}</p>
            <span class="agenda-proj"><span class="pdot" style="background:${p?p.color:'#999'}"></span>${p?esc(p.name):"—"}${t.subprojectId?" › "+esc(sectorName(p,t.subprojectId)):""} · ${esc(t.operator)}</span></div>
          <span class="tag-prio p-${t.prio}">${{alta:"Alta",media:"Média",baixa:"Baixa"}[t.prio]}</span>
          <span class="chip ${d.cls}">${d.text}</span></div>`);
        row.querySelector(".check").addEventListener("click",e=>{e.stopPropagation();toggleDone(t);});
        if(mine) row.addEventListener("click",()=>openTask(t.id));
        gEl.appendChild(row);
      });
      root.appendChild(gEl);
    });
    if(!any) root.appendChild(el(`<div class="empty-big"><h3>Nada por aqui</h3>
      <p>Nenhuma tarefa pendente com esses filtros.</p></div>`));
  }

  // ---------- modal ----------
  const overlay=document.getElementById("overlay"), mBody=document.getElementById("modal-body"),
        mTitle=document.getElementById("modal-title"), btnDelete=document.getElementById("btn-delete");

  function sectorOptions(projectId,selected){
    const p=projById(projectId);
    const subs=(p&&p.subprojects)||[];
    return `<option value="" ${!selected?"selected":""}>— Sem setor —</option>`+
      subs.map(s=>`<option value="${s.id}" ${s.id===selected?"selected":""}>${esc(s.name)}</option>`).join("");
  }

  function openTask(id,ctx){
    ctx=ctx||{};
    const t=id?data.tasks.find(x=>x.id===id):null;
    if(t&&!canEditTask(t)){ toast("Você só pode editar as suas tarefas"); return; }
    modal={type:"task",id,ctx};
    mTitle.textContent=id?"Editar tarefa":"Nova tarefa";
    const adm=isAdmin();
    const cur=t||{title:"",desc:"",due:"",prio:"media",col:ctx.col||"todo",
      projectId:ctx.projectId||data.projects[0]?.id,subprojectId:ctx.subprojectId||"",operator_id:me?me.id:null};
    const canMg=canManageProject(projById(cur.projectId));
    const isNew=!id;
    const lock=(adm||isNew)?"":"disabled";
    const lockSub=(adm||isNew||canMg)?"":"disabled";
    mBody.innerHTML=`
      <div class="field"><label>Título</label><input id="f-title" type="text" maxlength="120" value="${esc(cur.title)}" placeholder="Ex.: Enviar proposta"></div>
      <div class="field"><label>Descrição</label><textarea id="f-desc" placeholder="Detalhes, links…">${esc(cur.desc||"")}</textarea></div>
      <div class="row">
        <div class="field"><label>Projeto</label><select id="f-proj" ${lock}>${data.projects.map(p=>`<option value="${p.id}" ${p.id===cur.projectId?"selected":""}>${esc(p.name)}</option>`).join("")}</select></div>
        <div class="field"><label>Setor</label><select id="f-sub" ${lockSub}>${sectorOptions(cur.projectId,cur.subprojectId)}</select></div>
        <div class="field"><label>Operador</label><select id="f-op" ${lock}>
          ${activeProfiles().map(u=>`<option value="${u.id}" ${u.id===cur.operator_id?"selected":""}>${esc(u.name)}</option>`).join("")}</select></div>
      </div>
      <div class="row">
        <div class="field"><label>Prazo</label><input id="f-due" type="date" value="${cur.due||""}"></div>
        <div class="field"><label>Prioridade</label><select id="f-prio">
          <option value="baixa" ${cur.prio==="baixa"?"selected":""}>Baixa</option>
          <option value="media" ${cur.prio==="media"?"selected":""}>Média</option>
          <option value="alta" ${cur.prio==="alta"?"selected":""}>Alta</option></select></div>
        <div class="field"><label>Situação</label><select id="f-col">
          ${STAGES.map(s=>`<option value="${s.id}" ${s.id===cur.col?"selected":""}>${s.title}</option>`).join("")}</select></div>
      </div>
      ${(adm||isNew)?"":(canMg?`<p class="op-hint">Projeto privado seu: você pode mudar o setor.</p>`:`<p class="op-hint">Em tarefas existentes, projeto, setor e responsável só mudam pelo administrador.</p>`)}`;
    if(adm||isNew){
      mBody.querySelector("#f-proj").addEventListener("change",e=>{
        mBody.querySelector("#f-sub").innerHTML=sectorOptions(e.target.value,"");
      });
    }
    btnDelete.style.display=(id&&(adm||canMg))?"block":"none";
    openOverlay(); setTimeout(()=>{const e=document.getElementById("f-title");if(e)e.focus();},40);
  }

  function openSector(projectId,id){
    modal={type:"sector",id,ctx:{projectId}};
    const p=projById(projectId);
    const s=id?subById(p,id):{name:""};
    mTitle.textContent=id?"Editar setor":"Novo setor";
    mBody.innerHTML=`
      <p class="op-hint" style="margin:0 0 4px">Setor de <strong>${esc(p.name)}</strong>. Serve para agrupar tarefas por frente de trabalho.</p>
      <div class="field"><label>Nome do setor</label><input id="f-sname" type="text" maxlength="60" value="${esc(s.name)}" placeholder="Ex.: Arquitetura"></div>`;
    btnDelete.style.display=id?"block":"none";
    openOverlay(); setTimeout(()=>{const e=document.getElementById("f-sname");if(e)e.focus();},40);
  }

  function openProject(id){
    modal={type:"project",id,color:(id?projById(id).color:pickProjectColor())};
    mTitle.textContent=id?"Editar projeto":"Novo projeto";
    const p=id?projById(id):{name:"",desc:"",status:"ativo",private:!isAdmin()};
    const privLock=isAdmin()?"":"disabled";
    mBody.innerHTML=`
      <div class="field"><label>Nome do projeto</label><input id="f-name" type="text" maxlength="80" value="${esc(p.name)}" placeholder="Ex.: Lançamento do site"></div>
      <div class="field"><label>Descrição</label><textarea id="f-pdesc" placeholder="Objetivo do projeto…">${esc(p.desc||"")}</textarea></div>
      <div class="row">
        <div class="field"><label>Situação</label><select id="f-status">
          <option value="ativo" ${p.status==="ativo"?"selected":""}>Ativo</option>
          <option value="pausado" ${p.status==="pausado"?"selected":""}>Pausado</option>
          <option value="concluido" ${p.status==="concluido"?"selected":""}>Concluído</option></select></div>
        <div class="field"><label>Cor ${id?"":"(automática)"}</label>
          <div class="color-pick"><span class="color-dot" id="f-color" style="background:${modal.color}"></span></div></div>
      </div>
      <label class="switch-row">
        <input type="checkbox" id="f-priv" ${p.private?"checked":""} ${privLock}>
        <span class="switch"></span>
        <span class="switch-txt"><b>🔒 Projeto privado</b>
          <span>${isAdmin()?"Só o dono e admins veem, com tarefas e tudo":"Projetos criados por você são sempre privados — só você e admins veem"}</span></span>
      </label>`;
    btnDelete.style.display=id?"block":"none";
    openOverlay(); setTimeout(()=>{const e=document.getElementById("f-name");if(e)e.focus();},40);
  }

  function openTeam(){
    modal={type:"team",id:null};
    mTitle.textContent="Equipe";
    const rows=data.profiles.map(u=>{
      const count=data.tasks.filter(t=>t.operator_id===u.id).length;
      const pending=u.role!=="admin" && !u.approved;
      const actions=isAdmin() && u.role!=="admin" && (!me||u.id!==me.id)
        ? (pending
            ? `<button class="btn sm" data-approve="${u.id}">Aprovar</button>`
            : `<button class="btn sm" data-access="${u.id}">${u.access_all?"Vê tudo":"Restrito"}</button>
               <button class="btn sm" data-revoke="${u.id}">Revogar</button>`)
        : "";
      return `<div class="op-row">
        <span class="op" style="background:${opColor(u)}">${esc(initials(u.name))}</span>
        <span class="op-name">${esc(u.name)}${me&&u.id===me.id?' <span class="op-you">você</span>':''}</span>
        <span class="role-tag">${u.role==="admin"?"admin":(pending?"pendente":"operador")}</span>
        <span class="op-count">${count} tarefa(s)</span>${actions}
      </div>`;
    }).join("");
    mBody.innerHTML=`
      <p class="op-hint">Cada operador cria a própria conta na tela de login (botão "Criar conta"), usando o email de trabalho. A conta entra como <strong>pendente</strong> e só passa a ver o conteúdo depois que um admin aprovar aqui.${isAdmin()?" Para promover alguém a admin, use o painel do Supabase.":""}</p>
      <div class="team-list">${rows}</div>`;
    mBody.querySelectorAll("[data-approve]").forEach(b=>b.addEventListener("click",async()=>{
      const {error}=await sb.from("profiles").update({approved:true}).eq("id",b.dataset.approve);
      if(!dbErr(error)){ toast("Acesso liberado"); await loadAll(); openTeam(); }
    }));
    mBody.querySelectorAll("[data-revoke]").forEach(b=>b.addEventListener("click",async()=>{
      const {error}=await sb.from("profiles").update({approved:false}).eq("id",b.dataset.revoke);
      if(!dbErr(error)){ toast("Acesso revogado"); await loadAll(); openTeam(); }
    }));
    mBody.querySelectorAll("[data-access]").forEach(b=>b.addEventListener("click",()=>openAccess(b.dataset.access)));
    btnDelete.style.display="none";
    document.getElementById("btn-save").textContent="Fechar";
    document.getElementById("btn-cancel").style.display="none";
    openOverlay();
  }

  function openAccess(uid){
    const u=data.profiles.find(x=>x.id===uid); if(!u) return;
    modal={type:"access",id:uid};
    mTitle.textContent=`Projetos que ${u.name} vê`;
    const grants=new Set(data.access.filter(a=>a.profile_id===uid).map(a=>a.project_id));
    const shared=data.projects.filter(p=>!p.private);
    mBody.innerHTML=`
      <label class="switch-row" style="margin-bottom:10px">
        <input type="checkbox" id="acc-all" ${u.access_all?"checked":""}>
        <span class="switch"></span>
        <span class="switch-txt"><b>Vê todos os projetos de equipe</b>
          <span>Desligue para liberar projeto a projeto</span></span>
      </label>
      <div id="acc-list" style="${u.access_all?"opacity:.4;pointer-events:none":""}">
        ${shared.length?shared.map(p=>`<label style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer">
          <input type="checkbox" data-grant="${p.id}" ${grants.has(p.id)?"checked":""}>
          <span class="dot" style="width:10px;height:10px;background:${p.color}"></span>
          <span>${esc(p.name)}</span></label>`).join(""):`<p class="op-hint">Nenhum projeto de equipe ainda.</p>`}
      </div>
      <p class="op-hint">Com "todos" desligado, este operador só vê os projetos marcados acima (as mudanças valem na hora). Projetos privados não aparecem aqui: só o dono e admins os veem.</p>`;
    mBody.querySelector("#acc-all").addEventListener("change",async e=>{
      const {error}=await sb.from("profiles").update({access_all:e.target.checked}).eq("id",uid);
      if(!dbErr(error)){ await loadAll(); openAccess(uid); }
    });
    mBody.querySelectorAll("[data-grant]").forEach(cb=>cb.addEventListener("change",async()=>{
      const pid=cb.dataset.grant;
      const {error}=cb.checked
        ? await sb.from("project_access").insert({project_id:pid,profile_id:uid})
        : await sb.from("project_access").delete().eq("project_id",pid).eq("profile_id",uid);
      if(dbErr(error)){ cb.checked=!cb.checked; return; }
      await loadAll();
    }));
    btnDelete.style.display="none";
    document.getElementById("btn-save").textContent="Fechar";
    document.getElementById("btn-cancel").style.display="none";
    openOverlay();
  }

  function openOverlay(){ overlay.classList.add("open"); }
  function closeModal(){
    overlay.classList.remove("open");
    document.getElementById("btn-save").textContent="Salvar";
    document.getElementById("btn-cancel").style.display="";
    modal={type:null,id:null};
  }

  document.getElementById("btn-save").addEventListener("click",async()=>{
    if(modal.type==="team"||modal.type==="access"){ closeModal(); return; }
    if(modal.type==="sector"){
      const name=document.getElementById("f-sname").value.trim();
      if(!name){toast("Dê um nome ao setor");return;}
      const p=projById(modal.ctx.projectId);
      let subs=p.subprojects.slice();
      if(modal.id){ subs=subs.map(s=>s.id===modal.id?{...s,name}:s); }
      else{ const ns={id:uid(),name}; subs=subs.concat([ns]); state.sector=ns.id; }
      const {error}=await sb.from("projects").update({subprojects:subs}).eq("id",p.id);
      if(!dbErr(error)){ toast(modal.id?"Setor atualizado":"Setor criado"); closeModal(); await refresh(); }
      return;
    }
    if(modal.type==="task"){
      const title=document.getElementById("f-title").value.trim();
      if(!title){toast("Dê um título à tarefa");return;}
      const adm=isAdmin();
      const fields={
        title,
        description:document.getElementById("f-desc").value.trim(),
        due:document.getElementById("f-due").value||null,
        prio:document.getElementById("f-prio").value,
        col:document.getElementById("f-col").value
      };
      const projectId=document.getElementById("f-proj").value, proj=projById(projectId);
      if(adm || !modal.id){
        let sub=document.getElementById("f-sub").value;
        if(sub && !(proj.subprojects||[]).some(s=>s.id===sub)) sub="";
        fields.project_id=projectId; fields.subproject_id=sub;
        fields.operator_id=document.getElementById("f-op").value||null;
      }else if(canManageProject(proj)){
        let sub=document.getElementById("f-sub").value;
        if(sub && !(proj.subprojects||[]).some(s=>s.id===sub)) sub="";
        fields.subproject_id=sub;
      }
      let error;
      if(modal.id){ ({error}=await sb.from("tasks").update(fields).eq("id",modal.id)); }
      else{ ({error}=await sb.from("tasks").insert(fields)); }
      if(!dbErr(error)){ toast(modal.id?"Tarefa atualizada":"Tarefa criada"); closeModal(); await refresh(); }
      return;
    }
    // project
    const name=document.getElementById("f-name").value.trim();
    if(!name){toast("Dê um nome ao projeto");return;}
    const priv=isAdmin()?document.getElementById("f-priv").checked:true;
    const fields={name,description:document.getElementById("f-pdesc").value.trim(),
      status:document.getElementById("f-status").value,color:modal.color,private:priv};
    if(priv){
      const curOwner=modal.id?(projById(modal.id)||{}).owner_id:null;
      fields.owner_id=curOwner||me.id;
    }
    let error;
    if(modal.id){ ({error}=await sb.from("projects").update(fields).eq("id",modal.id)); }
    else{ ({error}=await sb.from("projects").insert({...fields,subprojects:[]})); }
    if(!dbErr(error)){ toast(modal.id?"Projeto atualizado":"Projeto criado"); closeModal(); await refresh(); }
  });

  btnDelete.addEventListener("click",async()=>{
    if(modal.type==="sector"){
      const p=projById(modal.ctx.projectId);
      const n=data.tasks.filter(t=>t.subprojectId===modal.id).length;
      if(confirm(`Excluir este setor?${n?` As ${n} tarefa(s) dele voltam para "Sem setor".`:""}`)){
        const subs=p.subprojects.filter(s=>s.id!==modal.id);
        const {error}=await sb.from("projects").update({subprojects:subs}).eq("id",p.id);
        if(dbErr(error)) return;
        // devolve tarefas ao "sem setor"
        await sb.from("tasks").update({subproject_id:""}).eq("project_id",p.id).eq("subproject_id",modal.id);
        if(state.sector===modal.id) state.sector=subs.length?"overview":"all";
        toast("Setor excluído"); closeModal(); await refresh();
      }
      return;
    }
    if(modal.type==="task"){
      if(confirm("Excluir esta tarefa?")){
        const {error}=await sb.from("tasks").delete().eq("id",modal.id);
        if(!dbErr(error)){ toast("Tarefa excluída"); closeModal(); await refresh(); }
      }
      return;
    }
    // project
    const n=tasksOf(modal.id).length;
    if(confirm(`Excluir o projeto e suas ${n} tarefa(s)?`)){
      const {error}=await sb.from("projects").delete().eq("id",modal.id);
      if(!dbErr(error)){
        if(state.projectId===modal.id) state.view="projects";
        toast("Projeto excluído"); closeModal(); await refresh();
      }
    }
  });

  document.getElementById("btn-cancel").addEventListener("click",closeModal);
  overlay.addEventListener("click",e=>{if(e.target===overlay)closeModal();});
  document.addEventListener("keydown",e=>{if(e.key==="Escape"&&overlay.classList.contains("open"))closeModal();});

  // ---------- misc helpers ----------
  function el(html){const t=document.createElement("template");t.innerHTML=html.trim();return t.content.firstElementChild;}
  function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
  let toastT;function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");
    clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2400);}

  boot();
})();
</script>
</body>
</html>
